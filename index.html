<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>US-Bangla Gate Checksheet App</title>
    <!-- Library required to convert HTML to JPG Image directly -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --primary: #0056b3;
            --secondary: #cce5ff;
            --bg: #e6f7ff; /* LITE SKY COLOR */
            --text: #333;
            --border: #b3d8fd;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { margin: 0; padding: 0; background-color: var(--bg); color: var(--text); }

        /* Screens */
        #splash-screen, #login-screen, #dashboard-screen {
            display: none;
            height: 100vh;
            width: 100vw;
        }

        /* Splash */
        #splash-screen {
            background-color: var(--primary);
            color: white;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            font-weight: bold;
            animation: fadeInOut 2s forwards;
            text-align: center;
            padding: 20px;
        }

        /* Login */
        #login-screen {
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }
        .login-box {
            background: white; padding: 40px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; 
            width: 100%; max-width: 400px; /* Mobile Friendly */
        }
        .login-box h1 { color: var(--primary); margin-bottom: 5px; font-style: italic; font-weight: 900; font-size: 1.8rem; }
        .login-box h3 { color: gray; margin-top: 0; margin-bottom: 30px; font-size: 1rem; }
        .input-group { text-align: left; margin-bottom: 15px; width: 100%; }
        .input-group label { display: block; font-size: 0.9rem; font-weight: bold; margin-bottom: 5px; color: #004085; }
        .input-group input, .input-group select {
            width: 100%; padding: 12px 10px; border: 1px solid var(--border); border-radius: 4px; background: #fff; font-size: 1rem;
        }
        button {
            background-color: var(--primary); color: white; border: none; padding: 14px 20px;
            border-radius: 4px; cursor: pointer; font-size: 1.1rem; width: 100%; font-weight: bold; transition: 0.2s;
        }
        button:hover { background-color: #004494; }
        button:disabled { background-color: #6c757d; cursor: not-allowed; }

        /* Dashboard */
        #dashboard-screen { display: none; flex-direction: column; height: auto; min-height: 100vh; padding: 15px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: var(--primary); color: white; padding: 12px 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); flex-wrap: wrap; gap: 10px; }
        .top-bar h2 { margin: 0; font-size: 1.2rem; word-break: break-word; }
        .top-bar button { width: auto; background: #d9534f; padding: 10px 15px; font-size: 0.9rem; }
        
        .section { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; width: 100%; overflow: hidden; }
        .section-title { margin-top: 0; color: var(--primary); border-bottom: 2px solid var(--secondary); padding-bottom: 10px; font-size: 1.3rem; }
        
        /* Grid for form inputs */
        .grid-form { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; }
        
        #status-display { padding: 12px; background: #f8f9fa; border: 1px solid #ddd; border-radius: 4px; font-weight: bold; color: var(--primary); margin-top: 5px; display: block; word-break: break-word; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .btn-group button { flex-grow: 1; padding: 14px; font-size: 1rem; }
        .btn-report { background-color: #28a745; }
        .btn-report:hover { background-color: #218838; }

        /* Custom buttons for sharing */
        .btn-share { background-color: #f39c12 !important; }
        .btn-share:hover { background-color: #e67e22 !important; }
        .btn-receive { background-color: #8e44ad !important; }
        .btn-receive:hover { background-color: #7d3c98 !important; }

        .table-responsive { overflow-x: auto; width: 100%; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; background: white; min-width: 700px; }
        table th, table td { border: 1px solid var(--border); padding: 10px 8px; text-align: left; }
        table th { background-color: var(--secondary); color: var(--primary); }

        .action-btns { display: flex; gap: 5px; flex-wrap: wrap; }
        .btn-edit { background-color: #f0ad4e !important; color: white; padding: 6px 10px !important; font-size: 0.8rem !important; border-radius: 3px; flex: 1; }
        .btn-del { background-color: #d9534f !important; color: white; padding: 6px 10px !important; font-size: 0.8rem !important; border-radius: 3px; flex: 1; }

        @keyframes fadeInOut {
            0% { opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }

        @media (max-width: 600px) {
            .grid-form { grid-template-columns: 1fr; } 
            .input-group[style*="grid-column: span 2"] { grid-column: auto !important; } 
            #dashboard-screen { padding: 10px 5px; } 
            .top-bar { flex-direction: column; text-align: center; } 
            .top-bar button { width: 100%; margin-top: 10px; } 
            .login-box { padding: 25px 15px; } 
            .section { padding: 15px; }
        }
    </style>
</head>
<body>

    <div id="splash-screen" style="display: flex;">WELCOME TO RADOAN'S APP</div>

    <div id="login-screen">
        <div class="login-box">
            <h1>US BANGLA AIRLINES</h1>
            <h3>GATE CHECKSHEET</h3>
            <form id="login-form">
                <div class="input-group">
                    <label>PREPARED BY</label>
                    <input type="text" id="prep-by" required placeholder="Enter Your Name">
                </div>
                <div class="input-group">
                    <label>USBA ID</label>
                    <input type="text" id="usba-id" required placeholder="e.g. 0088 or USBA-0088">
                </div>
                <button type="submit">LOG IN</button>
            </form>
        </div>
    </div>

    <div id="dashboard-screen">
        <div class="top-bar">
            <h2>Dashboard | Welcome <span id="user-display-name"></span></h2>
            <button onclick="logOut()">LOG OUT</button>
        </div>

        <div class="section">
            <h3 class="section-title">General Information</h3>
            <div class="grid-form">
                <div class="input-group">
                    <label>GATE TYPE</label>
                    <select id="g-gate-type" onchange="toggleGateTypeLogic()">
                        <option value="DOMESTIC">DOMESTIC</option>
                        <option value="INTERNATIONAL" selected>INTERNATIONAL</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>SESSION</label>
                    <select id="g-session">
                        <option value="MORNING">MORNING</option>
                        <option value="EVENING">EVENING</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>DATE</label>
                    <input type="date" id="g-date">
                </div>
                <div class="input-group">
                    <label>DUTY MANAGER</label>
                    <input type="text" id="g-dutymanager">
                </div>
                <div class="input-group">
                    <label>SUPERVISOR</label>
                    <input type="text" id="g-supervisore">
                </div>
                <div class="input-group">
                    <label>STAFF NAME(S)</label>
                    <input type="text" id="g-staff">
                </div>
            </div>
        </div>

        <div class="section">
            <h3 class="section-title">Add / Modify Flight</h3>
            <form id="flight-form">
                <div class="grid-form">
                    <div class="input-group"><label>FLIGHT NO</label><input type="text" id="f-no" required oninput="autoFillSector()"></div>
                    <div class="input-group"><label>SECTOR / DEST</label><input type="text" id="f-sector" required></div>
                    <div class="input-group"><label>A/C REG</label><input type="text" id="f-acreg"></div>
                    <div class="input-group"><label>STD (HHMM)</label><input type="text" id="f-std" required maxlength="4" pattern="\d{4}" placeholder="HHMM" oninput="calculateStatus()"></div>

                    <div class="input-group dom-field"><label>BOARDING START</label><input type="text" id="dom-bstart" maxlength="4" pattern="\d{4}" placeholder="HHMM"></div>
                    <div class="input-group dom-field"><label>BOARDING END</label><input type="text" id="dom-bend" maxlength="4" pattern="\d{4}" placeholder="HHMM"></div>
                    <div class="input-group dom-field">
                        <label>STATUS</label>
                        <select id="dom-status" onchange="handleDomStatusChange()">
                            <option value="ONTIME">ONTIME</option>
                            <option value="EARLY">EARLY</option>
                            <option value="DELAY">DELAY</option>
                        </select>
                    </div>
                    <div class="input-group dom-field" id="dom-early-box" style="display: none;"><label>MINS EARLY</label><input type="number" id="dom-early-mins"></div>
                    <div class="input-group dom-field" id="dom-delay-mins-box" style="display: none;"><label>DELAY MINS</label><input type="number" id="dom-delay-mins"></div>
                    <div class="input-group dom-field" id="dom-delay-box" style="display: none;"><label>DELAY REASON</label><input type="text" id="dom-delay-reason"></div>

                    <div class="input-group intl-field"><label>ATD (HHMM)</label><input type="text" id="f-atd" maxlength="4" pattern="\d{4}" placeholder="Optional for Initial" oninput="calculateStatus()"></div>
                    <div class="input-group intl-field" style="grid-column: span 2;">
                        <label>STATUS CALCULATOR</label>
                        <span id="status-display">Awaiting 4-Digit Time Input...</span>
                        <div id="delay-box" style="display: none; margin-top: 10px;"><input type="text" id="f-delay-reason" placeholder="Delay reason..."></div>
                    </div>
                    <div class="input-group intl-field"><label>GATE NO</label><input type="text" id="f-gateno"></div>
                    <div class="input-group intl-field"><label>CAPTAIN</label><input type="text" id="f-capt"></div>
                    <div class="input-group intl-field"><label>CREW CONFIG</label><input type="text" id="f-crew"></div>
                    <div class="input-group intl-field"><label>BOOK LOAD</label><input type="number" id="f-bookload"></div>
                    <div class="input-group intl-field"><label>ADULT</label><input type="number" id="f-act-adult"></div>
                    <div class="input-group intl-field"><label>INFANT</label><input type="number" id="f-act-infant"></div>
                    <div class="input-group intl-field"><label>GATE NS</label><input type="number" id="f-ns"></div>
                    <div class="input-group intl-field"><label>IMM OFF</label><input type="number" id="f-immi"></div>
                    <div class="input-group intl-field"><label>SELF OFF</label><input type="number" id="f-selfoff"></div>
                    <div class="input-group intl-field"><label>MAIL</label><input type="number" id="f-mail"></div>
                    <div class="input-group intl-field"><label>CARGO</label><input type="text" id="f-cargo"></div>
                    <div class="input-group intl-field"><label>LOAD CONTROL</label><input type="text" id="f-loadctrl"></div>
                    <div class="input-group intl-field"><label>RAMP OFFICER</label><input type="text" id="f-ramp"></div>
                    <div class="input-group intl-field"><label>MAAS</label><input type="number" id="f-maas"></div>
                    <div class="input-group intl-field"><label>WCHR/C</label><input type="number" id="f-wchr"></div>
                    <div class="input-group intl-field"><label>CON PAX/BAG</label><input type="text" id="f-conpax"></div>
                    <div class="input-group intl-field"><label>OBS</label><input type="number" id="f-obs"></div>
                    <div class="input-group intl-field"><label>FOC</label><input type="number" id="f-foc"></div>
                    <div class="input-group intl-field"><label>CAR</label><input type="text" id="f-car"></div>
                    <div class="input-group intl-field"><label>BUS</label><input type="text" id="f-bus"></div>
                </div>
                
                <div class="btn-group">
                    <button type="submit" id="submit-btn">ADD FLIGHT</button>
                    <button type="button" class="btn-report" onclick="generateFinalReport()">FINAL REPORT</button>
                    <button type="button" class="btn-share" onclick="shareData()">SHARE DATA</button>
                    <button type="button" class="btn-receive" onclick="receiveData()">RECEIVE DATA</button>
                    <input type="file" id="import-file" style="display: none;" accept=".usba,.json" onchange="handleImport(event)">
                </div>
            </form>
        </div>

        <div class="section">
            <h3 class="section-title">Summary Table</h3>
            <div class="table-responsive">
                <table>
                    <thead><tr id="summary-table-headers"><th>FLIGHT</th><th>SECTOR</th><th>STD</th><th>ATD</th><th>STATUS</th><th>ACTIONS</th></tr></thead>
                    <tbody id="flights-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const sectorMap = {
            'CGP': [101,103,105,107,109,111,113,115,117,119],
            'JSR': [121,123,125,127,129],
            'CXB': [141,143,145,147,149,151,153,155,157,159],
            'RJH': [161,163,165,167,169],
            'SPD': [181,183,185,187,189,191,193,195,197,199],
            'CCU': [201,203], 'MAA': [205,207,209], 'ZYL': [531,533,535,537,539],
            'DXB': [341,343], 'SHJ': [345,347], 'AUH': [349,351], 'JED': [361,363],
            'RUH': [381,383], 'BKK': [217,219], 'MLE': [337,339], 'MCT': [321,323],
            'CAN': [325,327], 'DOH': [333,335], 'KUL': [315,317,319], 'SIN': [307, 309]
        };

        let appData = { user: { name: '', id: '' }, global: { type: 'INTERNATIONAL', session: 'MORNING', date: '', dutymanager: '', supervisor: '', staff: '' }, flights: [] };
        let editingIndex = -1;

        window.onload = () => { document.getElementById('g-date').valueAsDate = new Date(); setTimeout(() => { document.getElementById('splash-screen').style.display = 'none'; checkLogin(); }, 2000); };
        function checkLogin() { const savedData = localStorage.getItem('usba_app_data'); if(savedData) { appData = JSON.parse(savedData); if(appData.user.name) { showDashboard(); return; } } document.getElementById('login-screen').style.display = 'flex'; }
        document.getElementById('login-form').addEventListener('submit', (e) => { e.preventDefault(); appData.user.name = document.getElementById('prep-by').value; appData.user.id = document.getElementById('usba-id').value; saveData(); document.getElementById('login-screen').style.display = 'none'; showDashboard(); });
        function logOut() { localStorage.removeItem('usba_app_data'); location.reload(); }
        function saveData() { appData.global = { type: document.getElementById('g-gate-type').value, session: document.getElementById('g-session').value, date: document.getElementById('g-date').value, dutymanager: document.getElementById('g-dutymanager').value, supervisor: document.getElementById('g-supervisore').value, staff: document.getElementById('g-staff').value }; localStorage.setItem('usba_app_data', JSON.stringify(appData)); }
        function toggleGateTypeLogic() {
            const gateType = document.getElementById('g-gate-type').value; const domFields = document.querySelectorAll('.dom-field'); const intlFields = document.querySelectorAll('.intl-field'); const summaryHeaders = document.getElementById('summary-table-headers');
            if (gateType === 'DOMESTIC') { domFields.forEach(el => el.style.display = 'block'); intlFields.forEach(el => el.style.display = 'none'); summaryHeaders.innerHTML = `<th>FLIGHT</th><th>DEST</th><th>STD</th><th>BOARDING END</th><th>STATUS</th><th>ACTIONS</th>`; handleDomStatusChange(); } 
            else { domFields.forEach(el => el.style.display = 'none'); intlFields.forEach(el => el.style.display = 'block'); summaryHeaders.innerHTML = `<th>FLIGHT</th><th>SECTOR</th><th>STD</th><th>ATD</th><th>STATUS</th><th>ACTIONS</th>`; }
        }
        function handleDomStatusChange() { const status = document.getElementById('dom-status').value; document.getElementById('dom-early-box').style.display = status === 'EARLY' ? 'block' : 'none'; document.getElementById('dom-delay-mins-box').style.display = status === 'DELAY' ? 'block' : 'none'; document.getElementById('dom-delay-box').style.display = status === 'DELAY' ? 'block' : 'none'; }
        function showDashboard() {
            document.getElementById('dashboard-screen').style.display = 'flex'; document.getElementById('user-display-name').innerText = appData.user.name;
            const g = appData.global; document.getElementById('g-date').value = g.date || ''; document.getElementById('g-gate-type').value = g.type || 'INTERNATIONAL'; document.getElementById('g-session').value = g.session || 'MORNING'; document.getElementById('g-dutymanager').value = g.dutymanager || ''; document.getElementById('g-supervisore').value = g.supervisor || ''; document.getElementById('g-staff').value = g.staff || '';
            toggleGateTypeLogic(); renderTable();
        }
        function autoFillSector() { let flightInput = document.getElementById('f-no').value; let numMatches = flightInput.match(/\d+/); if(!numMatches) return; let num = parseInt(numMatches[0]); for(let sector in sectorMap) { if(sectorMap[sector].includes(num)) { document.getElementById('f-sector').value = sector; return; } } }
        function calculateStatus() {
            let stdStr = document.getElementById('f-std').value; let atdStr = document.getElementById('f-atd').value; let display = document.getElementById('status-display'); let delayBox = document.getElementById('delay-box');
            if(!/^\d{4}$/.test(stdStr)) { display.innerText = "Awaiting HHMM STD..."; delayBox.style.display = "none"; return; }
            if(!/^\d{4}$/.test(atdStr)) { display.innerText = "Awaiting ATD..."; delayBox.style.display = "none"; return; }
            let stdMins = parseInt(stdStr.substring(0,2)) * 60 + parseInt(stdStr.substring(2,4)); let atdMins = parseInt(atdStr.substring(0,2)) * 60 + parseInt(atdStr.substring(2,4));
            let diff = atdMins - stdMins; if(diff < -720) diff += 1440; if(diff > 720) diff -= 1440;
            if(diff === 0) { display.innerText = "FLIGHT ONTIME"; display.style.color = "green"; delayBox.style.display = "none";
            } else if (diff < 0) { display.innerText = `FLIGHT ${Math.abs(diff)} MINS EARLY`; display.style.color = "green"; delayBox.style.display = "none";
            } else { display.innerText = `FLIGHT ${diff} MINS DELAY DUE TO:`; display.style.color = "red"; delayBox.style.display = "block"; }
        }
        function formatNil(val) { return (!val || val === '0') ? 'NIL' : val; }
        function formatReportDate(dStr) {
            if(!dStr) { let t = new Date(); dStr = t.toISOString().split('T')[0]; }
            let parts = dStr.split('-');
            const months = ['JANUARY', 'FEBRUARY', 'MARCH', 'APRIL', 'MAY', 'JUNE', 'JULY', 'AUGUST', 'SEPTEMBER', 'OCTOBER', 'NOVEMBER', 'DECEMBER'];
            return `${parts[2]} ${months[parseInt(parts[1])-1]} ${parts[0]}`;
        }

        document.getElementById('flight-form').addEventListener('submit', (e) => {
            e.preventDefault(); let isDom = document.getElementById('g-gate-type').value === 'DOMESTIC'; let fnoRaw = document.getElementById('f-no').value; let fnoFinal = fnoRaw.toUpperCase().startsWith('BS') ? fnoRaw.toUpperCase() : 'BS-' + fnoRaw.toUpperCase(); let stdRaw = document.getElementById('f-std').value;
            let newFlight = {};
            if (isDom) {
                let domStatusDrop = document.getElementById('dom-status').value; let domFinalStatusStr = "";
                if (domStatusDrop === 'ONTIME') domFinalStatusStr = "FLIGHT ONTIME";
                else if (domStatusDrop === 'EARLY') domFinalStatusStr = `FLIGHT ${document.getElementById('dom-early-mins').value} MINS EARLY`;
                else if (domStatusDrop === 'DELAY') domFinalStatusStr = `FLIGHT ${document.getElementById('dom-delay-mins').value} MINS DELAY DUE TO ${document.getElementById('dom-delay-reason').value.toUpperCase()}`;
                newFlight = { fno: fnoFinal, sector: document.getElementById('f-sector').value.toUpperCase(), acreg: document.getElementById('f-acreg').value.toUpperCase(), std: stdRaw + ' LT', bstart: document.getElementById('dom-bstart').value + ' LT', bend: document.getElementById('dom-bend').value + ' LT', status: domFinalStatusStr, domStatusType: domStatusDrop };
            } else {
                let atdRaw = document.getElementById('f-atd').value; let intlStatusFinal = "";
                if (atdRaw) {
                    let stdMins = parseInt(stdRaw.substring(0,2)) * 60 + parseInt(stdRaw.substring(2,4)); let atdMins = parseInt(atdRaw.substring(0,2)) * 60 + parseInt(atdRaw.substring(2,4));
                    let diff = atdMins - stdMins; if(diff < -720) diff += 1440;
                    if(diff === 0) intlStatusFinal = "FLIGHT ONTIME"; else if(diff < 0) intlStatusFinal = `FLIGHT ${Math.abs(diff)} MINS EARLY`; else intlStatusFinal = `FLIGHT ${diff} MINS DELAY DUE TO ${document.getElementById('f-delay-reason').value.toUpperCase()}`;
                }
                newFlight = { fno: fnoFinal, sector: document.getElementById('f-sector').value.toUpperCase(), acreg: document.getElementById('f-acreg').value.toUpperCase(), std: stdRaw + ' LT', atd: atdRaw ? atdRaw + ' LT' : '', capt: document.getElementById('f-capt').value.toUpperCase(), crew: document.getElementById('f-crew').value, book: document.getElementById('f-bookload').value, actual: `${document.getElementById('f-act-adult').value || "0"}+${(document.getElementById('f-act-infant').value || "0").padStart(2, '0')}`, gatens: formatNil(document.getElementById('f-ns').value), immi: formatNil(document.getElementById('f-immi').value), selfoff: formatNil(document.getElementById('f-selfoff').value), mail: formatNil(document.getElementById('f-mail').value), cargo: formatNil(document.getElementById('f-cargo').value), gateno: document.getElementById('f-gateno').value.toUpperCase(), loadc: document.getElementById('f-loadctrl').value.toUpperCase(), ramp: document.getElementById('f-ramp').value.toUpperCase(), maas: formatNil(document.getElementById('f-maas').value), wchr: formatNil(document.getElementById('f-wchr').value), conpax: formatNil(document.getElementById('f-conpax').value), gdmant: 'SEND', obs: formatNil(document.getElementById('f-obs').value), foc: formatNil(document.getElementById('f-foc').value), fids: 'DONE', vehicle: (document.getElementById('f-car').value ? 'C-'+document.getElementById('f-car').value : '') + (document.getElementById('f-bus').value ? ', B-'+document.getElementById('f-bus').value : '') || 'NIL', status: intlStatusFinal };
            }
            if(editingIndex > -1) { appData.flights[editingIndex] = newFlight; editingIndex = -1; document.getElementById('submit-btn').innerText = "ADD FLIGHT"; } else { appData.flights.push(newFlight); }
            saveData(); renderTable(); document.getElementById('flight-form').reset(); document.getElementById('f-no').focus(); toggleGateTypeLogic(); 
        });

        function renderTable() {
            let tbody = document.getElementById('flights-tbody'); tbody.innerHTML = ''; let isDom = appData.global.type === 'DOMESTIC';
            appData.flights.forEach((fl, index) => { tbody.innerHTML += `<tr><td><strong>${fl.fno}</strong></td><td>${fl.sector}</td><td>${fl.std}</td><td>${isDom?fl.bend:fl.atd}</td><td>${fl.status||'-'}</td><td class="action-btns"><button type="button" class="btn-edit" onclick="editFlight(${index})">Edit</button><button type="button" class="btn-del" onclick="deleteFlight(${index})">Del</button></td></tr>`; });
        }

        function editFlight(index) {
            document.getElementById('submit-btn').innerText = "MODIFY"; editingIndex = index; window.scrollTo({ top: 0, behavior: 'smooth' });
            let fl = appData.flights[index]; document.getElementById('f-no').value = fl.fno.replace('BS-', ''); document.getElementById('f-sector').value = fl.sector; document.getElementById('f-acreg').value = fl.acreg; document.getElementById('f-std').value = fl.std.replace(' LT', ''); 
            if (appData.global.type === 'DOMESTIC') { document.getElementById('dom-bstart').value = fl.bstart.replace(' LT', ''); document.getElementById('dom-bend').value = fl.bend.replace(' LT', ''); document.getElementById('dom-status').value = fl.domStatusType; handleDomStatusChange(); } 
            else { document.getElementById('f-atd').value = (fl.atd||'').replace(' LT', ''); document.getElementById('f-capt').value = fl.capt; document.getElementById('f-crew').value = fl.crew; document.getElementById('f-bookload').value = fl.book; calculateStatus(); }
        }
        function deleteFlight(index) { if(confirm("Delete flight?")) { appData.flights.splice(index, 1); saveData(); renderTable(); } }

        function shareData() {
            saveData(); const dataStr = JSON.stringify(appData); const fileName = `USBA_Data_${appData.global.date || 'Export'}.usba`; const blob = new Blob([dataStr], { type: 'application/json' }); const file = new File([blob], fileName, { type: 'application/json' });
            if (navigator.canShare && navigator.canShare({ files: [file] })) { navigator.share({ files: [file], title: 'USBA Data Share' }).catch(() => downloadDataFallback(blob, fileName)); } 
            else { downloadDataFallback(blob, fileName); }
        }
        function downloadDataFallback(blob, fileName) { const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = fileName; a.click(); alert("File prepared. Share manually via WhatsApp."); }
        function receiveData() { document.getElementById('import-file').click(); }
        function handleImport(e) {
            const file = e.target.files[0]; if (!file) return; const reader = new FileReader();
            reader.onload = (ev) => { try { const imported = JSON.parse(ev.target.result); if (confirm("Overwrite current dashboard with this data?")) { appData = imported; localStorage.setItem('usba_app_data', JSON.stringify(appData)); location.reload(); } } catch (err) { alert("Invalid file."); } }; reader.readAsText(file);
        }

        function generateFinalReport() {
            saveData(); let btn = document.querySelector('.btn-report'); let originalText = btn.innerText; btn.innerText = "GENERATING..."; btn.disabled = true;
            let formattedID = appData.user.id.toUpperCase(); if(!formattedID.startsWith('USBA-')) formattedID = 'USBA-' + formattedID.replace('USBA', '');
            let reportDateStr = formatReportDate(appData.global.date); let isDom = appData.global.type === 'DOMESTIC'; let isInitial = !isDom && appData.flights.some(fl => !fl.atd || fl.atd.trim() === '');
            let dmHTML = appData.global.dutymanager ? `<div style="display: inline-block; background-color: #0033a0; color: #ffffff; padding: 8px 35px; border-radius: 50px; font-size: 24px; font-weight: 900; margin-top: 10px; margin-bottom: 10px; box-shadow: 0px 4px 6px rgba(0,0,0,0.2); border: 2px solid #ffffff; letter-spacing: 1px;">DUTY MANAGER : ${appData.global.dutymanager.toUpperCase()}</div>` : '';

            let reportDiv = document.createElement('div'); reportDiv.style.position = 'absolute'; reportDiv.style.top = '-9999px'; reportDiv.style.left = '0'; reportDiv.style.width = isDom ? '1400px' : '1123px'; reportDiv.style.backgroundColor = '#e0f2fe'; reportDiv.style.padding = '30px';
            let htmlStr = `
                <style>
                    .export-tbl { width: 100%; border-collapse: collapse; margin-bottom: 20px; border: 2px solid #002244; background: white; }
                    .export-tbl td { border: 1px solid #002244; padding: 10px; text-align: center; vertical-align: middle; }
                    .airline-title { font-family: 'Arial Black', sans-serif; font-style: italic; color: #0033a0; font-size: 38px; margin: 5px 0; text-align: center; display: block; width:100%; }
                    .export-tbl h3 { margin: 2px 0; color: #0056b3; font-size: 24px; text-align: center; display: block; width:100%; }
                    .data-tbl { width: 100%; border-collapse: collapse; border: 2px solid #002244; table-layout: fixed; font-size: 16px; background: white; font-weight: bold; }
                    .data-tbl th, .data-tbl td { border: 1px solid #002244; padding: 8px; text-align: center; }
                    .row-header { background-color: #b3d4ff; text-align: left !important; width: 140px; }
                    .bg-header-blue { background-color: #b3d4ff !important; text-align:center !important; }
                    .bg-light-yellow { background-color: #fff9c4 !important; font-weight: 900 !important; font-size: 19px !important; }
                    .status-delay { background-color: #ff0000 !important; color: #ffffff !important; }
                    .st-blue { background-color: #007bff !important; color: #ffffff !important; }
                    .st-sky { background-color: #87ceeb !important; color: #000000 !important; }
                    .imp-row { background-color: #87ceeb !important; font-weight: 900 !important; font-size: 18px; }
                    .col-sl { width: 4%; } .col-flight { width: 8%; } .col-dest { width: 6%; } .col-acreg { width: 7%; } .col-std { width: 8%; } .col-bstart { width: 11%; } .col-bend { width: 11%; } .col-status { width: 45%; text-align: left !important; padding-left: 15px !important; }
                </style>
                <table class="export-tbl">
                    <tr><td colspan="2" class="bg-header-blue"><span class="airline-title">US-BANGLA AIRLINES</span><h3>${appData.global.type} GATE CHECKLIST (${appData.global.session})${isInitial?' <span style="color:red">INITIAL</span>':''}</h3>${dmHTML}</td></tr>
                    <tr class="bg-light-yellow"><td style="text-align: left; width: 50%;">DATE : ${reportDateStr}</td><td style="text-align: left; width: 50%;">SUPERVISOR: ${appData.global.supervisor.toUpperCase()}</td></tr>
                    <tr class="bg-light-yellow"><td style="text-align: left;">PREPARED BY : ${appData.user.name.toUpperCase()} // ${formattedID}</td><td style="text-align: left;">STAFF: ${appData.global.staff.toUpperCase()}</td></tr>
                </table>`;

            if (isDom) {
                htmlStr += `<table class="data-tbl"><thead><tr style="background-color:#eee"><th>S/L</th><th>FLIGHT</th><th>DEST</th><th>A/C REG</th><th>STD</th><th>BOARDING START</th><th>BOARDING END</th><th style="width:45%">STATUS</th></tr></thead><tbody>`;
                appData.flights.forEach((fl, i) => {
                    let sC = ''; let sU = fl.status.toUpperCase(); if(sU.includes('DELAY')) sC='status-delay'; else if(sU.includes('EARLY')) sC='st-blue'; else sC='st-sky';
                    htmlStr += `<tr><td>${String(i+1).padStart(2,'0')}</td><td>${fl.fno}</td><td>${fl.sector}</td><td>${fl.acreg}</td><td>${fl.std}</td><td>${fl.bstart}</td><td>${fl.bend}</td><td class="${sC} col-status">${fl.status}</td></tr>`;
                });
                htmlStr += `</tbody></table>`;
            } else {
                htmlStr += `<table class="data-tbl"><tbody>`;
                let rows = [{t:'FLIGHT',k:'fno'},{t:'SECTOR',k:'sector'},{t:'A/C REG',k:'acreg'},{t:'STD',k:'std'},{t:'ATD',k:'atd'},{t:'CAPT',k:'capt'},{t:'CREW',k:'crew'},{t:'BOOK',k:'book'},{t:'ACTUAL',k:'actual'},{t:'GATE NS',k:'gatens'},{t:'IMM OFF',k:'immi'},{t:'SELF OFF',k:'selfoff'},{t:'MAIL',k:'mail'},{t:'CARGO',k:'cargo'},{t:'GATE NO',k:'gateno'},{t:'LOAD CTRL',k:'loadc'},{t:'RAMP',k:'ramp'},{t:'MAAS',k:'maas'},{t:'WCHR/C',k:'wchr'},{t:'CON PAX',k:'conpax'},{t:'GD/MANT',k:'gdmant',c:true},{t:'OBS',k:'obs'},{t:'FOC',k:'foc'},{t:'FIDS',k:'fids',c:true},{t:'VEHICLE',k:'vehicle'}];
                rows.forEach(r => { 
                    if(r.c && isInitial) return; 
                    let isImp = (r.k === 'fno' || r.k === 'sector');
                    htmlStr += `<tr class="${isImp ? 'imp-row' : ''}"><th class="row-header">${r.t}</th>`; 
                    appData.flights.forEach(fl => { let dV = fl[r.k]; if(isInitial && (!dV || dV==='NIL')) dV = ''; htmlStr += `<td>${dV||''}</td>`; }); 
                    htmlStr += `</tr>`; 
                });
                htmlStr += `<tr><th class="row-header">STATUS</th>`; appData.flights.forEach(fl => { let sC = ''; let sU = (fl.status||'').toUpperCase(); if(sU.includes('DELAY')) sC='status-delay'; else if(sU.includes('EARLY')) sC='st-blue'; else sC='st-sky'; htmlStr += `<td class="${sC}">${fl.status}</td>`; }); htmlStr += `</tr></tbody></table>`;
            }
            reportDiv.innerHTML = htmlStr; document.body.appendChild(reportDiv);
            html2canvas(reportDiv, { scale: 2, backgroundColor: '#e0f2fe' }).then(canvas => {
                let link = document.createElement('a'); link.download = `USBA_${appData.global.type}_Report.jpg`; link.href = canvas.toDataURL('image/jpeg', 0.95); link.click();
                document.body.removeChild(reportDiv); btn.innerText = originalText; btn.disabled = false;
            });
        }
    </script>
</body>
</html>
